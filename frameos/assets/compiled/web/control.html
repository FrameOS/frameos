<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame Control</title>
    <style>
        html {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            padding: 0;
            margin: 0;
            background: white;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
        }
        .background-absolute {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.5;
            overflow: hidden;
        }
        .content-bg {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            max-height: 100%;
            overflow: hidden;
        }
        .text-bg {
            max-height: calc(100% - 40px);
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            padding-top: 2px;
            overflow: auto;
        }
    </style>
    <script>
        let authKey = "";
        const headers = {'Content-Type': 'application/json'}
        if (window.location.search) {
            for (const [key, value] of window.location.search.substring(1).split("&").map(p => p.split("="))) {
                if (key === 'k') {
                    headers['Authorization'] = 'Bearer ' + value;
                    authKey = value;
                }
            }
        }
        function getBasePath() {
            const path = window.location.pathname || '/';
            return path.endsWith('/c') ? path.slice(0, -2) + '/' : (path.endsWith('/') ? path : path + '/');
        }

        function buildFrameUrl(path) {
            return getBasePath() + path;
        }
        function postRender() {
            fetch(buildFrameUrl('event/render'), {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({})
            })
        }
        // Field metadata (name, type, showIf conditions) injected by the server
        var frameosFields = [/*$$fieldsMetaJson$$*/];
        function frameosFieldValue(field) {
            var el = document.getElementById(field.name);
            if (!el) { return undefined; }
            var raw = el.value;
            if (field.type === 'integer') { return parseInt(raw); }
            if (field.type === 'float') { return parseFloat(raw); }
            if (field.type === 'boolean') { return raw === 'true'; }
            return raw;
        }
        function frameosFieldValues() {
            var values = {};
            for (var i = 0; i < frameosFields.length; i++) {
                var field = frameosFields[i];
                var value = frameosFieldValue(field);
                if (value !== undefined) { values[field.name] = value; }
            }
            return values;
        }
        // Mirrors evaluateShowIf in the FrameOS frontend: top level conditions
        // are OR-ed, "and" blocks are AND-ed, no conditions means visible.
        function frameosMatchCondition(condition, values, currentFieldName) {
            if (condition && condition.and) {
                for (var i = 0; i < condition.and.length; i++) {
                    if (!frameosMatchCondition(condition.and[i], values, currentFieldName)) { return false; }
                }
                return true;
            }
            var field = (condition && condition.field) || currentFieldName || '';
            var operator = condition ? condition.operator : undefined;
            var value = condition ? condition.value : undefined;
            var actual = values[field];
            if (operator === 'eq') { return actual === value; }
            if (operator === 'ne') { return actual !== value; }
            if (operator === 'gt') { return actual > value; }
            if (operator === 'lt') { return actual < value; }
            if (operator === 'gte') { return actual >= value; }
            if (operator === 'lte') { return actual <= value; }
            if (operator === 'in') { return !!(value && value.includes && value.includes(actual)); }
            if (operator === 'notIn') { return !(value && value.includes && value.includes(actual)); }
            if (operator === 'empty') { return !actual; }
            if (operator === 'notEmpty') { return !!actual; }
            return value !== undefined ? value === actual : !!actual;
        }
        function frameosShouldShow(conditions, values, currentFieldName) {
            if (!conditions || conditions.length === 0) { return true; }
            for (var i = 0; i < conditions.length; i++) {
                if (frameosMatchCondition(conditions[i], values, currentFieldName)) { return true; }
            }
            return false;
        }
        function frameosFieldVisible(field, values) {
            return frameosShouldShow(field.showIf, values, field.name);
        }
        function frameosUpdateFieldVisibility() {
            var values = frameosFieldValues();
            for (var i = 0; i < frameosFields.length; i++) {
                var field = frameosFields[i];
                var wrapper = document.getElementById('stateField--' + field.name);
                if (wrapper) {
                    wrapper.style.display = frameosFieldVisible(field, values) ? '' : 'none';
                }
            }
        }
        function postSetSceneState() {
            var values = frameosFieldValues();
            var state = {};
            for (var i = 0; i < frameosFields.length; i++) {
                var field = frameosFields[i];
                if (frameosFieldVisible(field, values) && values[field.name] !== undefined) {
                    state[field.name] = values[field.name];
                }
            }
            var data = { render: true, state: state };
            fetch(buildFrameUrl('event/setSceneState'), {
                method: 'POST',
                headers: headers,
                body: JSON.stringify(data)
            });
            document.getElementById('setSceneState').value = 'Now wait a while...';
        }
        window.addEventListener('DOMContentLoaded', function () {
            frameosUpdateFieldVisibility();
            document.addEventListener('input', frameosUpdateFieldVisibility);
            document.addEventListener('change', frameosUpdateFieldVisibility);
        });
        function postSetCurrentScene() { 
            var data={sceneId: document.getElementById('currentSceneId').value};
            fetch(buildFrameUrl('event/setCurrentScene'), { 
                method: 'POST', 
                headers: headers, 
                body: JSON.stringify(data) 
            }); 
            document.getElementById('setCurrentScene').value = 'Reloading in 5'; 
            window.setTimeout(() => { 
                document.getElementById('setCurrentScene').value = 'Reloading...'; 
                window.location.reload();
            }, 5000);
        }
    </script>
</head>
<body style="position:relative">
    <div class="background-absolute">
        <script>
            if (authKey) {
                document.write('<iframe src="' + buildFrameUrl('?s=contain&k=' + encodeURIComponent(authKey)) + '" style="width:100%;height:100%;border:0"></iframe>');
            } else {
                document.write('<iframe src="' + buildFrameUrl('?s=contain') + '" style="width:100%;height:100%;border:0"></iframe>');
            }
        </script>
    </div>
    <div class="content-bg">
        <div class="text-bg">
            <h2>Scene</h2>
            <form onSubmit='postSetCurrentScene(); return false'><select id="currentSceneId">/*$$sceneOptionsHtml$$*/</select><input type='submit' id="setCurrentScene" value='Set Scene'></form>
            <h2>State</h2>
            <form onSubmit='postSetSceneState(); return false'>/*$$fieldsHtml$$*/</form>
            <h2>Actions:</h2>
            <form onSubmit='postRender(); return false'><input type='submit' value='Render'></form>
        </div>
    </div>
</body>
</html>
