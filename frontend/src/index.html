<!DOCTYPE html>
<html lang="en" class="bg-gray-900">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        if (window.localStorage.getItem('frameos.workspaceTheme') === 'dark') {
          document.documentElement.dataset.frameosTheme = 'dark'
          document.documentElement.style.colorScheme = 'dark'
        }
      } catch (error) {}
    </script>
    <title>FrameOS Backend</title>
  </head>
  <body class="text-white">
    <div id="root"></div>
    <div id="modal" style="position: absolute; z-index: 10"></div>
    <div id="popper" style="position: absolute; z-index: 80"></div>
  </body>
</html>
