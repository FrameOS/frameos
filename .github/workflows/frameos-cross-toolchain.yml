name: Publish FrameOS cross-toolchain images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Toolchain image tag to publish"
        required: false
        default: latest
        type: string
  push:
    branches:
      - main
    paths:
      - backend/bin/cross.py
      - backend/tools/cross-toolchain.Dockerfile
      - .github/workflows/frameos-cross-toolchain.yml

permissions:
  contents: read

jobs:
  determine-matrix:
    runs-on: ubuntu-24.04
    outputs:
      targets: ${{ steps.set-matrix.outputs.targets }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          MATRIX=$(python3 backend/bin/cross matrix)
          echo "targets=$MATRIX" >> "$GITHUB_OUTPUT"

  publish:
    needs: determine-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-matrix.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push cross-toolchain image
        env:
          TARGET_DISTRIBUTION: ${{ matrix.distro }}
          TARGET_VERSION: ${{ matrix.version }}
          TARGET_PLATFORM: ${{ matrix.platform }}
          BASE_IMAGE: ${{ matrix.image }}
          IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || 'latest' }}
        run: |
          set -euo pipefail
          SAFE_PLATFORM="${TARGET_PLATFORM//\//_}"
          IMAGE="frameos/frameos-cross-toolchain:${TARGET_DISTRIBUTION}_${TARGET_VERSION}-${SAFE_PLATFORM}-${IMAGE_TAG}"
          docker buildx build \
            --platform "$TARGET_PLATFORM" \
            --build-arg BASE_IMAGE="$BASE_IMAGE" \
            --tag "$IMAGE" \
            --push \
            -f backend/tools/cross-toolchain.Dockerfile \
            .
