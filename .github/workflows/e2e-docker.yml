name: E2E Docker Image

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
    paths-ignore:
      - buildroot-images.json
      - cross-toolchain-images.json

jobs:
  docker_image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --target runtime -t frameos .

      - name: Run Docker container
        run: |
          docker run -d \
            -p 8989:8989 \
            -v ./db:/app/db \
            --name frameos \
            --restart always \
            -e SECRET_KEY="bananana" \
            frameos

      - name: Wait for service on port 8989
        run: |
          echo "Waiting up to 30s for the service to respond on port 8989..."
          if ! timeout 30 bash -c "until curl -s http://localhost:8989; do sleep 1; done"; then
            echo "Service did not become ready in time. Printing container logs:"
            docker logs frameos || true
            exit 1
          fi

      - name: Test /signup endpoint
        id: signup-test
        run: |
          # We'll capture the HTTP status code so we can fail the step if it's not 2xx
          echo "Testing /api/signup with a sample payload..."
          HTTP_CODE=$(curl -s -o /dev/stderr -w "%{http_code}" -X POST http://localhost:8989/api/signup \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"asdfasdf","password2":"asdfasdf","newsletter":false}')

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Signup request failed with status code $HTTP_CODE"
            exit 1
          else
            echo "Signup request succeeded with status code $HTTP_CODE"
          fi

  pico_firmware_images:
    name: Build Pico firmware images
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --target runtime -t frameos .

      - name: Build Pico and Pico 2 W firmware images
        timeout-minutes: 30
        run: |
          docker run --rm \
            frameos \
            bash -lc '
              set -euo pipefail
              bash embedded/pico2/ci_build_image.sh
              FRAMEOS_PICO_PLATFORM=pico2w bash embedded/pico2/ci_build_image.sh
            '

  esp32_firmware_image:
    name: Build and boot ESP32 firmware image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build ESP32 CI Docker image
        run: |
          docker build --target esp32-ci -t frameos-esp32-ci .

      - name: Build and boot ESP32 firmware image
        timeout-minutes: 60
        run: |
          docker run --rm \
            -e FRAMEOS_SELECTED_PANEL=EPD_7in5_V2 \
            frameos-esp32-ci \
            bash -lc '
              set -euo pipefail
              bash embedded/esp32/ci_build_image.sh
              FRAMEOS_ESP32_QEMU=1 FRAMEOS_ESP32_BUILD_DIR=build-ci-qemu \
                bash embedded/esp32/ci_build_image.sh
            '

  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    needs:
      - docker_image
      - pico_firmware_images
      - esp32_firmware_image
    if: ${{ always() }}
    steps:
      - name: Check parallel jobs
        run: |
          if [ "${{ needs.docker_image.result }}" != "success" ]; then
            echo "Docker image job finished with result: ${{ needs.docker_image.result }}"
            exit 1
          fi
          if [ "${{ needs.pico_firmware_images.result }}" != "success" ]; then
            echo "Pico firmware image job finished with result: ${{ needs.pico_firmware_images.result }}"
            exit 1
          fi
          if [ "${{ needs.esp32_firmware_image.result }}" != "success" ]; then
            echo "ESP32 firmware image job finished with result: ${{ needs.esp32_firmware_image.result }}"
            exit 1
          fi
