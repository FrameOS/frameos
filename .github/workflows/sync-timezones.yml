name: Sync timezone data

on:
  repository_dispatch:
    types:
      - timezone-data-updated
  workflow_dispatch:
    inputs:
      tz_ref:
        description: "FrameOS/tz ref to import"
        required: false
        default: "main"

permissions:
  contents: write

concurrency:
  group: timezone-sync
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'FrameOS/frameos'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout FrameOS
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Checkout tz distribution
        uses: actions/checkout@v4
        with:
          repository: FrameOS/tz
          path: tz
          ref: ${{ github.event.client_payload.tz_ref || inputs.tz_ref || 'main' }}
          fetch-depth: 1

      - name: Import and validate timezone data
        id: import
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          set -euo pipefail
          TZ_DIR="$WORKSPACE/tz"

          for file in tzdata.json timezone_aliases.json dstchanges.csv timezones.csv; do
            if [ ! -s "$TZ_DIR/dist/$file" ]; then
              echo "FrameOS/tz dist/$file is missing or empty"
              exit 1
            fi
          done
          if [ "$(stat -c %s "$TZ_DIR/dist/tzdata.json")" -lt 1000000 ]; then
            echo "FrameOS/tz dist/tzdata.json is unexpectedly small"
            exit 1
          fi

          TZ_COMMIT="$(git -C "$TZ_DIR" rev-parse HEAD)"
          echo "tz_commit=$TZ_COMMIT" >> "$GITHUB_OUTPUT"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          workspace = Path(os.environ["WORKSPACE"])
          source = workspace / "tz/dist/tzdata.json"
          alias_source = workspace / "tz/dist/timezone_aliases.json"
          data = json.loads(source.read_text(encoding="utf-8"))
          aliases = json.loads(alias_source.read_text(encoding="utf-8"))

          if not isinstance(data, dict):
            raise SystemExit("tzdata.json is not a JSON object")
          if not isinstance(aliases, dict):
            raise SystemExit("timezone_aliases.json is not a JSON object")
          timezones = data.get("timezones")
          if not isinstance(timezones, list) or not timezones:
            raise SystemExit("tzdata.json missing or empty timezones list")
          if not isinstance(data.get("dstChanges"), list):
            raise SystemExit("tzdata.json missing or invalid dstChanges list")
          if not all(isinstance(item, dict) and isinstance(item.get("name"), str) for item in timezones):
            raise SystemExit("tzdata.json timezones entries are malformed")
          if not all(isinstance(key, str) and isinstance(value, str) for key, value in aliases.items()):
            raise SystemExit("timezone_aliases.json entries are malformed")

          timezone_names = sorted({item["name"] for item in timezones} | set(aliases.keys()) | {"UTC"})
          timezone_targets = {item["name"] for item in timezones}
          missing_alias_targets = sorted({target for target in aliases.values() if target not in timezone_targets})
          if missing_alias_targets:
            sample = ", ".join(missing_alias_targets[:20])
            extra = "" if len(missing_alias_targets) <= 20 else f", and {len(missing_alias_targets) - 20} more"
            raise SystemExit(f"timezone_aliases.json points to missing timezone names: {sample}{extra}")

          existing_timezones_path = workspace / "frontend/src/decorators/timezones.json"
          if existing_timezones_path.exists():
            existing_timezones = json.loads(existing_timezones_path.read_text(encoding="utf-8"))
            if not isinstance(existing_timezones, list) or not all(isinstance(item, str) for item in existing_timezones):
              raise SystemExit("Existing frontend timezone list is malformed")
            missing_existing_timezones = sorted(set(existing_timezones) - set(timezone_names))
            if missing_existing_timezones:
              sample = ", ".join(missing_existing_timezones[:20])
              extra = "" if len(missing_existing_timezones) <= 20 else f", and {len(missing_existing_timezones) - 20} more"
              raise SystemExit(
                "Imported timezone list would remove existing frontend timezone names. "
                f"Missing: {sample}{extra}"
              )

          (workspace / "frameos/assets/compiled/tz/tzdata.json").write_text(
            source.read_text(encoding="utf-8"),
            encoding="utf-8",
          )
          (workspace / "frameos/assets/compiled/tz/timezone_aliases.json").write_text(
            alias_source.read_text(encoding="utf-8"),
            encoding="utf-8",
          )
          (workspace / "frontend/src/decorators/timezones.json").write_text(
            json.dumps(timezone_names, separators=(",", ":")) + "\n",
            encoding="utf-8",
          )
          print(f"Imported {len(timezones)} timezones and {len(aliases)} aliases")
          PY

      - name: Commit and push FrameOS timezone updates
        run: |
          set -euo pipefail
          if git diff --quiet -- frameos/assets/compiled/tz/tzdata.json frameos/assets/compiled/tz/timezone_aliases.json frontend/src/decorators/timezones.json; then
            echo "No FrameOS timezone changes to commit"
            exit 0
          fi

          FRAMEOS_BRANCH="${{ github.event.repository.default_branch }}"
          git config user.name "frameos-bot"
          git config user.email "git@frameos.net"
          git add frameos/assets/compiled/tz/tzdata.json frameos/assets/compiled/tz/timezone_aliases.json frontend/src/decorators/timezones.json
          git commit -m "chore: sync timezone data from FrameOS/tz/${{ steps.import.outputs.tz_commit }}"
          git push origin "HEAD:$FRAMEOS_BRANCH"
