name: Run Tests

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  nim:
    name: FrameOS Nim Tests (${{ matrix.shard_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            shard_name: shard 1
          - shard: 2
            shard_name: shard 2
          - shard: 3
            shard_name: shard 3
          - shard: 4
            shard_name: shard 4
          - shard: 5
            shard_name: shard 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install python dependencies
        run: |
          cd backend
          python -m pip install --upgrade uv
          uv venv
          uv pip install -r requirements.txt

      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: 2.2.4
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: FrameOS nim setup
        run: |
          cd frameos
          nimble install -d
          nimble assets
          nimble build_quickjs --silent
          nimble setup
          FRAMEOS_ROOT_DIR="." python3 ../e2e/makeapploaders.py

      - name: FrameOS nim tests
        run: |
          cd frameos
          bash ./tools/run_test_shard.sh ${{ matrix.shard }}

  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install python dependencies
        run: |
          cd backend
          python -m pip install --upgrade uv
          uv venv
          uv pip install -r requirements.txt

      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: 2.2.4
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: FrameOS nim build
        run: |
          cd frameos
          nimble install -d
          nimble setup
          FRAMEOS_ROOT_DIR="." python3 ../e2e/makeapploaders.py
          nimble build

      - name: Visual regression tests
        run: |
          cd e2e
          source ../backend/.venv/bin/activate
          make
          git status --short
          git diff --name-only

      - name: Commit updated snapshots
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: EndBug/add-and-commit@v9
        id: commit
        with:
            add: 'e2e/*'
            author_name: FrameOS Bot
            author_email: git@frameos.net
            message: 'Update snapshots'
            pull: --rebase --autostash
            default_author: github_actions

  frontend-visual-regression:
    name: Frontend E2E + Visual Regression Tests (${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Install redis
        run: |
          sudo apt-get -y update
          sudo apt-get install -y redis-server
          redis-server --daemonize yes

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install python dependencies
        run: |
          cd backend
          python -m pip install --upgrade uv
          uv venv
          uv pip install -r requirements.txt

      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build frontend
        run: pnpm --dir frontend run build

      - name: Run frontend visual regression tests
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository }}
        env:
          DEBUG: '1'
          SECRET_KEY: frontend-visual-ci-secret
          DATABASE_URL: sqlite:///${{ github.workspace }}/.tmp/frontend-visual.db
          REDIS_URL: redis://localhost:6379/15
        run: |
          source backend/.venv/bin/activate
          pnpm exec playwright test -c e2e/frontend-visual/playwright.config.ts --shard=${{ matrix.shard }}/4

      - name: Update frontend visual snapshots
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          DEBUG: '1'
          SECRET_KEY: frontend-visual-ci-secret
          DATABASE_URL: sqlite:///${{ github.workspace }}/.tmp/frontend-visual.db
          REDIS_URL: redis://localhost:6379/15
        run: |
          source backend/.venv/bin/activate
          pnpm exec playwright test -c e2e/frontend-visual/playwright.config.ts --update-snapshots --shard=${{ matrix.shard }}/4
          git status --short e2e/frontend-visual/snapshots

      - name: Collect frontend visual snapshot changes
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          mkdir -p .tmp/frontend-visual-snapshot-artifact
          printf 'frontend visual snapshot shard %s/4\n' '${{ matrix.shard }}' > ".tmp/frontend-visual-snapshot-artifact/SHARD-${{ matrix.shard }}.txt"
          git diff --name-only -- e2e/frontend-visual/snapshots > .tmp/frontend-visual-snapshot-files.txt
          git ls-files --others --exclude-standard -- e2e/frontend-visual/snapshots >> .tmp/frontend-visual-snapshot-files.txt
          sort -u .tmp/frontend-visual-snapshot-files.txt -o .tmp/frontend-visual-snapshot-files.txt
          while IFS= read -r file; do
            if [ -z "$file" ] || [ ! -f "$file" ]; then
              continue
            fi
            mkdir -p ".tmp/frontend-visual-snapshot-artifact/$(dirname "$file")"
            cp "$file" ".tmp/frontend-visual-snapshot-artifact/$file"
          done < .tmp/frontend-visual-snapshot-files.txt

      - name: Upload frontend visual snapshot changes
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-visual-snapshot-changes-${{ matrix.shard }}
          path: .tmp/frontend-visual-snapshot-artifact
          if-no-files-found: error

      - name: Upload frontend visual report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-visual-report-${{ matrix.shard }}-of-4
          path: |
            e2e/frontend-visual/playwright-report
            e2e/frontend-visual/test-results
          if-no-files-found: ignore

  frontend-visual-snapshot-commit:
    name: Commit Frontend Visual Snapshots
    runs-on: ubuntu-latest
    needs: frontend-visual-regression
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}

      - name: Download frontend visual snapshot changes
        uses: actions/download-artifact@v4
        with:
          pattern: frontend-visual-snapshot-changes-*
          path: .tmp/frontend-visual-snapshot-artifacts
          merge-multiple: true

      - name: Restore frontend visual snapshot changes
        run: |
          if [ -d .tmp/frontend-visual-snapshot-artifacts/e2e/frontend-visual/snapshots ]; then
            cp -a .tmp/frontend-visual-snapshot-artifacts/e2e/frontend-visual/snapshots/. e2e/frontend-visual/snapshots/
          fi
          git status --short e2e/frontend-visual/snapshots

      - name: Commit frontend visual snapshots
        uses: EndBug/add-and-commit@v9
        with:
            add: 'e2e/frontend-visual/snapshots/**'
            author_name: FrameOS Bot
            author_email: git@frameos.net
            message: 'Update frontend visual snapshots'
            pull: --rebase --autostash
            default_author: github_actions

  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Install redis
        run: sudo apt-get -y update && sudo apt-get install -y redis-server

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install python dependencies
        run: |
          cd backend
          python -m pip install --upgrade uv
          uv venv
          uv pip install -r requirements.txt

      - name: Run Pytest
        run: |
          cd backend
          source .venv/bin/activate
          # fake these folders so static asset serving doesn't fail
          mkdir -p ../frontend/dist/assets
          mkdir -p ../frontend/dist/img
          mkdir -p ../frontend/dist/static
          TEST=1 pytest

  deploy-e2e:
    name: Deploy E2E SSH
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: 2.2.4
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install redis
        run: |
          sudo apt-get -y update
          sudo apt-get install -y redis-server
          redis-server --daemonize yes

      - name: Verify Docker
        run: docker version

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install python dependencies
        run: |
          cd backend
          python -m pip install --upgrade uv
          uv venv
          uv pip install -r requirements.txt

      - name: Prepare FrameOS build inputs
        run: |
          cd frameos
          nimble install -d
          nimble assets
          nimble build_quickjs --silent
          nimble setup
          FRAMEOS_ROOT_DIR="." python3 ../e2e/makeapploaders.py
          nimble build

      - name: Run SSH deploy E2E test
        run: |
          cd backend
          source .venv/bin/activate
          mkdir -p ../frontend/dist/assets
          mkdir -p ../frontend/dist/img
          mkdir -p ../frontend/dist/static
          TEST=1 FRAMEOS_E2E_DEPLOY=1 pytest app/tasks/tests/test_real_ssh_deploy_e2e.py -q -s

      - name: Run runtime render log E2E test
        run: |
          cd backend
          source .venv/bin/activate
          TEST=1 FRAMEOS_E2E_RUNTIME=1 FRAMEOS_RUNTIME_BIN="${{ github.workspace }}/frameos/build/frameos" pytest app/tasks/tests/test_real_frameos_runtime_e2e.py -q -s

      - name: Cache Buildroot E2E inputs
        uses: actions/cache@v4
        with:
          path: |
            .tmp/buildroot-base-cache
            .tmp/cross-cache
          key: ${{ runner.os }}-buildroot-e2e-${{ hashFiles('tools/buildroot-images/manifest.json', 'buildroot-images.json', 'frameos/frameos.nimble') }}
          restore-keys: |
            ${{ runner.os }}-buildroot-e2e-

      - name: Run Buildroot SD image E2E test
        timeout-minutes: 90
        env:
          FRAMEOS_ARTIFACT_DIR: ${{ github.workspace }}/.tmp/buildroot-artifacts
          FRAMEOS_BUILDROOT_BASE_CACHE_DIR: ${{ github.workspace }}/.tmp/buildroot-base-cache
          FRAMEOS_BUILDROOT_CACHE_DIR: ${{ github.workspace }}/.tmp/buildroot-cache
          FRAMEOS_BUILDROOT_BASE_TIMEOUT: '300'
          FRAMEOS_CROSS_CACHE: ${{ github.workspace }}/.tmp/cross-cache
          FRAMEOS_CROSS_MAKE_JOBS: '2'
          FRAMEOS_E2E_BUILDROOT: '1'
        run: |
          cd backend
          source .venv/bin/activate
          TEST=1 pytest app/tasks/tests/test_real_buildroot_sd_image_e2e.py -q -s

  typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm --dir frontend run build
