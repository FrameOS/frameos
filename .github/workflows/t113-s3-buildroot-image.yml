name: T113-S3 Buildroot SD image

on:
  workflow_dispatch:
    inputs:
      wifi_variant:
        description: Buildroot Wi-Fi fragment to include
        required: true
        default: none
        type: choice
        options:
          - none
          - rtl8189fs
          - rtl8723ds
      buildroot_ref:
        description: Buildroot branch, tag, or commit
        required: true
        default: "2026.02.1"
      artifact_name:
        description: Download artifact base name
        required: true
        default: frameos-t113-s3-glibc-runtime-docker
      retention_days:
        description: GitHub artifact retention in days
        required: true
        default: "14"

jobs:
  build-image:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      BUILDROOT_REF: ${{ inputs.buildroot_ref }}
      BUILDROOT_DIR: ${{ runner.temp }}/frameos-t113-s3/buildroot
      OUTPUT_DIR: ${{ runner.temp }}/frameos-t113-s3/output
      IMAGE_ARTIFACTS_DIR: ${{ runner.temp }}/frameos-t113-s3/image
      FRAMEOS_RUNTIME_ARTIFACTS_DIR: ${{ runner.temp }}/frameos-t113-s3/runtime
      GENERATED_DIR: ${{ runner.temp }}/frameos-t113-s3/generated-c
      PACKAGE_DIR: ${{ runner.temp }}/frameos-t113-s3/download
      FRAMEOS_BUILD_RUNTIME: "1"
      FRAMEOS_WIFI_VARIANT: ${{ inputs.wifi_variant }}
      IMAGE_NAME: ${{ inputs.artifact_name }}-${{ inputs.wifi_variant }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build SD image in Docker
        run: ./scripts/docker-t113-s3-buildroot.sh

      - name: Inspect SD image
        env:
          BUILDROOT_OUTPUT_DIR: ${{ env.OUTPUT_DIR }}
          ARTIFACTS_DIR: ${{ env.FRAMEOS_RUNTIME_ARTIFACTS_DIR }}
        run: ./scripts/inspect-t113-s3-build.sh

      - name: Package download artifact
        run: ./scripts/package-t113-s3-image.sh

      - name: Upload SD image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}
          path: |
            ${{ env.PACKAGE_DIR }}/*.img.xz
            ${{ env.PACKAGE_DIR }}/*.img.xz.sha256
            ${{ env.PACKAGE_DIR }}/*.manifest.txt
            ${{ env.IMAGE_ARTIFACTS_DIR }}/metadata.json
            ${{ env.IMAGE_ARTIFACTS_DIR }}/sdcard.img.sha256
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
